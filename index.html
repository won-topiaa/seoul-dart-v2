<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울 다트 — 오늘 어디 갈까?</title>
<meta name="description" content="서울 지도에 다트를 던져 오늘 갈 동네를 정해드립니다. MBTI-P 우유부단 탈출기.">
<style>
:root{
  --bg:#090c14;--bg2:#0f1320;--bg3:#161c2e;--bg4:#1c2438;
  --border:#1a2035;--border2:#262f4a;
  --txt:#dde4f5;--txt2:#6e7a9e;--txt3:#404a68;
  --gold:#f5a623;--goldL:rgba(245,166,35,.18);--goldD:rgba(245,166,35,.07);
  --red:#ff4d5e;--blue:#4f8ef7;--green:#00d09c;
  --r12:12px;--r16:16px;--r20:20px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;transition:opacity .45s,transform .45s;}
.screen.out{opacity:0;pointer-events:none;transform:scale(.98);}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:300;
  background:rgba(9,12,20,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);padding:10px 20px;
  display:flex;align-items:center;gap:10px;}
.hdr-logo{width:32px;height:32px;background:linear-gradient(135deg,#f5a623,#ff6b35);border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
  box-shadow:0 2px 12px rgba(245,166,35,.3);}
.hdr-name{font-size:14px;font-weight:800;letter-spacing:-.3px;}
.hdr-tag{font-size:10px;color:var(--txt3);margin-top:1px;font-weight:500;}

/* ── GAME SCREEN ── */
#gameScreen{justify-content:center;}
#arenaWrap{position:relative;margin-top:54px;touch-action:none;cursor:crosshair;}
#seoulSvg{display:block;border-radius:var(--r16);overflow:hidden;max-width:100%;}
#curtainCvs{position:absolute;top:0;left:0;border-radius:var(--r16);pointer-events:none;z-index:4;max-width:100%;}
#dartCvs{position:absolute;top:0;left:0;z-index:6;cursor:crosshair;max-width:100%;}
#guideTxt{
  position:absolute;bottom:-48px;left:0;right:0;
  text-align:center;pointer-events:none;transition:opacity .3s;
}
.guide-inner{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--bg3);border:1px solid var(--border2);
  padding:7px 16px;border-radius:20px;font-size:12px;color:var(--txt2);
}
.guide-inner .dart-ico{display:inline-block;animation:bob 2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}

/* ── RESULT SCREEN ── */
#resultScreen{overflow-y:auto;padding:62px 16px 48px;gap:0;align-items:stretch;justify-content:flex-start;}
.res-inner{max-width:820px;margin:0 auto;width:100%;}

.res-hero{
  text-align:center;padding:28px 20px 24px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r20);margin-bottom:16px;position:relative;overflow:hidden;
}
.res-hero::before{
  content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(245,166,35,.08) 0%,transparent 70%);
  pointer-events:none;
}
.res-pin{font-size:32px;margin-bottom:10px;filter:drop-shadow(0 2px 8px rgba(245,166,35,.4));}
.res-gu{
  font-size:36px;font-weight:900;letter-spacing:-1.5px;line-height:1;
  background:linear-gradient(135deg,#f5a623,#ff9f43);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:6px;
}
.res-dong{font-size:17px;font-weight:700;color:var(--txt2);letter-spacing:-.3px;margin-bottom:10px;}
.res-range{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--goldD);border:1px solid rgba(245,166,35,.2);
  color:var(--gold);font-size:11px;font-weight:600;
  padding:4px 12px;border-radius:20px;
}

.map-link{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:14px;
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--txt2);font-size:12px;font-weight:600;
  padding:7px 16px;border-radius:20px;text-decoration:none;
  transition:all .15s;cursor:pointer;
}
.map-link:hover{border-color:var(--gold);color:var(--gold);}

/* ── PLACE GRID ── */
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:600px){.res-grid{grid-template-columns:1fr;}}

.res-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r16);overflow:hidden;}
.res-card-hd{
  display:flex;align-items:center;gap:7px;
  padding:12px 14px 10px;
  border-bottom:1px solid var(--border);
  font-size:11px;font-weight:700;color:var(--txt3);
  text-transform:uppercase;letter-spacing:.5px;
}
.res-card-hd .hd-ico{font-size:15px;}
.res-card-body{padding:4px 0;}

.place-list{list-style:none;}
.place-item{border-bottom:1px solid var(--border);}
.place-item:last-child{border-bottom:none;}
.place-item a{
  display:block;padding:10px 14px;text-decoration:none;
  transition:background .12s;
}
.place-item a:hover{background:var(--bg3);}
.place-name{font-size:13px;font-weight:700;color:var(--txt);display:flex;align-items:center;gap:5px;}
.place-dist{font-size:10px;font-weight:700;background:var(--goldL);color:var(--gold);border-radius:4px;padding:1px 6px;flex-shrink:0;}
.place-cat{font-size:11px;color:var(--txt3);margin-top:2px;}
.place-addr{font-size:10px;color:var(--txt3);margin-top:1px;opacity:.6;}
.place-empty{font-size:12px;color:var(--txt3);padding:14px;}

/* ── LOADING ── */
.ai-loading{text-align:center;padding:48px 0;color:var(--txt3);}
.ai-spinner{
  width:30px;height:30px;border:2.5px solid var(--border2);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin .65s linear infinite;margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:13px;color:var(--txt2);}

/* ── ACTIONS ── */
.res-actions{display:flex;gap:10px;justify-content:center;padding-bottom:8px;}
.btn-retry{
  padding:12px 28px;
  background:linear-gradient(135deg,#f5a623,#ff7a35);
  color:#09090f;border:none;border-radius:var(--r12);
  font-size:14px;font-weight:800;cursor:pointer;
  transition:opacity .15s;font-family:inherit;
  box-shadow:0 4px 16px rgba(245,166,35,.25);
}
.btn-retry:hover{opacity:.88;}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.modal-bg.hidden{display:none;}
.modal{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--r20);padding:28px;max-width:380px;width:90%;
}
.modal-title{font-size:16px;font-weight:800;margin-bottom:6px;}
.modal-desc{font-size:12px;color:var(--txt3);line-height:1.75;margin-bottom:18px;}
.modal-input{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r12);padding:11px 14px;font-size:13px;color:var(--txt);
  outline:none;font-family:inherit;margin-bottom:14px;transition:border-color .2s;
}
.modal-input:focus{border-color:var(--gold);}
.modal-btns{display:flex;gap:10px;}
.modal-save{
  flex:1;padding:11px;background:var(--gold);color:#09090f;
  border:none;border-radius:var(--r12);font-size:13px;font-weight:800;
  cursor:pointer;font-family:inherit;transition:opacity .15s;
}
.modal-save:hover{opacity:.88;}
.modal-cancel{
  padding:11px 18px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r12);font-size:13px;color:var(--txt2);
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.modal-cancel:hover{border-color:var(--border2);}

/* ── DISTRICT PULSE ── */
@keyframes distPulse{0%,100%{opacity:.6;transform:scale(1);}50%{opacity:1;transform:scale(1.15);}}
.dist-label-hit{animation:distPulse .9s ease-in-out 3;}
</style>
</head>

  <div>
    <div class="hdr-name">서울 다트</div>

  </div>

<div class="screen out" id="resultScreen">

    </div>

    <div id="aiOut">
      <div class="ai-loading" id="aiLoading">
        <div class="ai-spinner"></div>

      <div class="res-grid" id="resGrid" style="display:none">
        <div class="res-card">
          <div class="res-card-hd"><span class="hd-ico">🗺</span>갈만한 곳</div>

        </div>
        <div class="res-card">
          <div class="res-card-hd"><span class="hd-ico">🍽</span>맛집 · 식당</div>
          <div class="res-card-body"><ul class="place-list" id="list2"></ul></div>
        </div>
        <div class="res-card">
          <div class="res-card-hd"><span class="hd-ico">☕</span>카페</div>
          <div class="res-card-body"><ul class="place-list" id="list3"></ul></div>
        </div>
      </div>
    </div>

    <div class="res-actions">
      <button class="btn-retry" onclick="resetGame()">🎯 다시 던지기</button>
    </div>
  </div>
</div>

<!-- API MODAL (숨김 — 비상용) -->
<div class="modal-bg hidden" id="modalBg">
  <div class="modal">
    <div class="modal-title">🗝 카카오 REST API 키</div>
    <div class="modal-desc">주변 장소 검색에 카카오 REST API 키가 필요합니다.<br>키는 이 브라우저에만 저장됩니다.</div>
    <input class="modal-input" id="apiInput" type="password" placeholder="REST API 키 입력..."/>
    <div class="modal-btns">
      <button class="modal-save" onclick="saveKey()">저장</button>
      <button class="modal-cancel" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

  '동작구':   [{n:'노량진',x:253,y:397},{n:'흑석동',x:256,y:400},{n:'상도동',x:273,y:422},{n:'사당동',x:293,y:437},{n:'대방동',x:242,y:408}],
  '관악구':   [{n:'신림동',x:266,y:490},{n:'봉천동',x:278,y:476},{n:'서울대입구',x:288,y:466},{n:'낙성대',x:280,y:470}],
  '강남구':   [{n:'압구정동',x:393,y:332},{n:'청담동',x:443,y:327},{n:'삼성동 코엑스',x:453,y:347},{n:'역삼동',x:398,y:358},{n:'대치동',x:442,y:366},{n:'개포동',x:462,y:370},{n:'논현동',x:412,y:338}],
  '강동구':   [{n:'천호동',x:553,y:377},{n:'강동역',x:563,y:387},{n:'길동',x:568,y:397},{n:'암사동',x:578,y:382},{n:'상일동',x:578,y:415},{n:'고덕동',x:570,y:408}],
  '송파구':   [{n:'잠실동',x:488,y:402},{n:'석촌동',x:473,y:417},{n:'방이동',x:493,y:432},{n:'오금동',x:508,y:442},{n:'가락동',x:498,y:452},{n:'송파동',x:480,y:430}],
  '서초구':   [{n:'강남역 서초동',x:368,y:417},{n:'방배동',x:356,y:437},{n:'반포동',x:366,y:400},{n:'양재동',x:398,y:472},{n:'잠원동',x:383,y:397},{n:'내곡동',x:412,y:490}],
};

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
const W = 600, H = 540;
let state = 'idle';
let mapRot = [0,90,180,270][Math.floor(Math.random()*4)];
let pulling = false, pxC=0, pyC=0;
const DART_HOME = {x:300, y:490};
let hitDist=null, hitDong=null, hitLatLng=null;
let raf=null, curtainProg=0;
let kakaoKey = localStorage.getItem('sdt_kakao_key') || 'd34d46334dc32deae1b94065bd2f9a27';

function svgToLatLng(sx, sy) {
  const cx=W/2, cy=H/2, a=-mapRot*Math.PI/180;
  const rx = Math.cos(a)*(sx-cx) - Math.sin(a)*(sy-cy) + cx;
  const ry = Math.sin(a)*(sx-cx) + Math.cos(a)*(sy-cy) + cy;
  return {
    lat: +(37.715 - (ry/H)*0.302).toFixed(6),
    lng: +(126.734 + (rx/W)*0.450).toFixed(6)
  };
}

/* ── ARENA SIZE ── */
function applyArenaSize() {
  const pad = 16;
  const dispW = Math.min(W, window.innerWidth - pad);
  const dispH = Math.round(dispW * H / W);
  document.getElementById('seoulSvg').setAttribute('width', dispW);
  document.getElementById('seoulSvg').setAttribute('height', dispH);
  ['curtainCvs','dartCvs'].forEach(id => {
    const c = document.getElementById(id);
    c.style.width = dispW+'px'; c.style.height = dispH+'px';
  });
}

(function init() {
  const svg = document.getElementById('seoulSvg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  ['curtainCvs','dartCvs'].forEach(id => {
    const c = document.getElementById(id);
    c.width=W; c.height=H;
  });
  applyArenaSize();
  window.addEventListener('resize', applyArenaSize);
  buildMap(); drawCurtain(0); drawDart(DART_HOME.x,DART_HOME.y,-90,false);
  const dc = document.getElementById('dartCvs');
  dc.addEventListener('mousedown', onDown);
  dc.addEventListener('mousemove', onMove);
  dc.addEventListener('mouseup', onUp);
  dc.addEventListener('mouseleave', onLeave);
  dc.addEventListener('touchstart', e=>{e.preventDefault();onDown(e.touches[0]);},{passive:false});
  dc.addEventListener('touchmove',  e=>{e.preventDefault();onMove(e.touches[0]);},{passive:false});
  dc.addEventListener('touchend',   e=>{e.preventDefault();onUp(e.changedTouches[0]);},{passive:false});
})();

function buildMap() {
  const svg = document.getElementById('seoulSvg');
  svg.innerHTML='';
  const bg = mkSvg('rect');
  setAttr(bg,{x:0,y:0,width:W,height:H,fill:'#0c0f1c'});
  svg.appendChild(bg);
  const g = mkSvg('g');
  g.setAttribute('id','mapG');
  g.setAttribute('transform',`rotate(${mapRot},${W/2},${H/2})`);
  D.forEach((d,i)=>{
    const poly=mkSvg('polygon');
    setAttr(poly,{points:d.p,fill:d.c,stroke:'#090c16','stroke-width':'1.5','data-i':i});
    g.appendChild(poly);
    const txt=mkSvg('text');
    setAttr(txt,{x:d.cx,y:d.cy,'font-size':'9','fill':'rgba(180,200,255,0.45)',
      'text-anchor':'middle','dominant-baseline':'middle',
      'font-family':'sans-serif','font-weight':'600','pointer-events':'none','id':'lbl'+i});
    txt.textContent=d.n;
    g.appendChild(txt);
  });
  svg.appendChild(g);
}
function mkSvg(tag){return document.createElementNS('http://www.w3.org/2000/svg',tag);}
function setAttr(el,attrs){Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));}

/* ── CURTAIN ── */
function drawCurtain(prog) {
  const cvs=document.getElementById('curtainCvs');
  const ctx=cvs.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if(prog>=1) return;
  const revY=prog*(H+60), covH=Math.max(0,H-revY);
  const grd=ctx.createLinearGradient(0,0,0,covH);
  grd.addColorStop(0,'#171f14');grd.addColorStop(.4,'#1e2a1a');
  grd.addColorStop(.8,'#171f14');grd.addColorStop(1,'#131a10');
  ctx.fillStyle=grd; ctx.fillRect(0,0,W,covH);
  ctx.save(); ctx.globalAlpha=.1; ctx.strokeStyle='#3d5030'; ctx.lineWidth=20;
  for(let x=-H;x<W+H;x+=44){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+covH*.7,covH);ctx.stroke();}
  ctx.restore();
  if(prog>0.02){
    const t=Date.now()*0.004;
    ctx.beginPath(); ctx.moveTo(0,covH);
    for(let x=0;x<=W;x+=8){
      const wave=Math.sin(x*.055+t)*7+Math.sin(x*.022+t*.6)*5;
      ctx.lineTo(x,covH+wave);
    }
    ctx.beginPath();
    for(let x=0;x<=W;x+=6){
      const wave=Math.sin(x*.055+t)*7+Math.sin(x*.022+t*.6)*5;
      x===0?ctx.moveTo(x,covH+wave):ctx.lineTo(x,covH+wave);
    }
    ctx.strokeStyle='rgba(165,130,40,0.65)'; ctx.lineWidth=2; ctx.stroke();
    const gE=ctx.createLinearGradient(0,covH-2,0,covH+18);
    gE.addColorStop(0,'rgba(165,130,40,0.12)');gE.addColorStop(1,'transparent');
    ctx.fillStyle=gE; ctx.fillRect(0,covH-2,W,20);
  }
  if(prog<0.05){
    ctx.globalAlpha=.18; ctx.fillStyle='#90b878';
    ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
    ctx.fillText('⛺ 천막으로 가려진 서울 지도',W/2,H/2-16);
    ctx.font='10px sans-serif'; ctx.globalAlpha=.1;
    ctx.fillText('지도는 무작위로 회전되어 방향을 알 수 없어요',W/2,H/2+12);
    ctx.globalAlpha=1;
  }
}

/* ── DART ── */
function drawDart(x,y,angleDeg,stuck) {
  const cvs=document.getElementById('dartCvs');
  const ctx=cvs.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const rad=angleDeg*Math.PI/180;
  ctx.save(); ctx.translate(x,y); ctx.rotate(rad);
  ctx.shadowColor='rgba(0,0,0,.55)'; ctx.shadowBlur=stuck?14:7;
  ctx.beginPath(); ctx.moveTo(0,-28); ctx.lineTo(3,-10); ctx.lineTo(-3,-10);
  ctx.closePath(); ctx.fillStyle=stuck?'#ff8844':'#cccccc'; ctx.fill();
  ctx.beginPath(); ctx.roundRect(-3.5,-10,7,18,2);
  ctx.fillStyle='#7a7a7a'; ctx.fill();
  [0,4,8].forEach(dy=>{ctx.beginPath();ctx.rect(-3.5,-8+dy,7,2);ctx.fillStyle='#5a5a5a';ctx.fill();});
  const fc=stuck?'#ff5544':'#4f8ef7';
  [[-9,18],[-4,14],[4,14],[9,18]].forEach(([fx,fy])=>{
    ctx.beginPath(); ctx.moveTo(0,8); ctx.lineTo(fx,fy); ctx.lineTo(0,14);
    ctx.closePath(); ctx.fillStyle=fc; ctx.globalAlpha=.9; ctx.fill(); ctx.globalAlpha=1;
  });
  ctx.shadowBlur=0; ctx.restore();
  if(!stuck) drawSlingshot(ctx, pulling?pxC:DART_HOME.x, pulling?pyC:DART_HOME.y);
  if(pulling&&state==='pull'){
    const ax1=DART_HOME.x-24, ay1=DART_HOME.y+32, ax2=DART_HOME.x+24, ay2=DART_HOME.y+32;
    ctx.beginPath(); ctx.moveTo(ax1,ay1); ctx.lineTo(pxC,pyC); ctx.lineTo(ax2,ay2);
    ctx.strokeStyle='rgba(150,110,50,.85)'; ctx.lineWidth=2; ctx.stroke();
    const dist=Math.hypot(pxC-DART_HOME.x,pyC-DART_HOME.y);
    const power=Math.min(dist/MAX_PULL,1);
    ctx.beginPath(); ctx.arc(DART_HOME.x,DART_HOME.y,6,0,Math.PI*2);
    ctx.strokeStyle=`rgba(245,166,35,${power*.8})`; ctx.lineWidth=1.5; ctx.stroke();
  }
}
function drawSlingshot(ctx,dx,dy){
  ctx.save(); ctx.strokeStyle='#4e3014'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(dx-16,dy+20); ctx.lineTo(dx-28,dy+52); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(dx+16,dy+20); ctx.lineTo(dx+28,dy+52); ctx.stroke();
  ctx.lineWidth=6;
  ctx.beginPath(); ctx.moveTo(dx-28,dy+52); ctx.lineTo(dx+28,dy+52); ctx.stroke();
  ctx.restore();
}

/* ── MECHANICS ── */
const MAX_PULL=360;
function getXY(e){
  const r=document.getElementById('dartCvs').getBoundingClientRect();
  return {x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height)};
}
function onDown(e){
  if(state!=='idle') return;
  const {x,y}=getXY(e);
  if(Math.hypot(x-DART_HOME.x,y-DART_HOME.y)>70) return;
  state='pull'; pulling=true; pxC=x; pyC=y;
  document.getElementById('guideTxt').style.opacity='0';
}
function onMove(e){
  if(state!=='pull') return;
  let {x,y}=getXY(e);
  const dx=x-DART_HOME.x, dy=y-DART_HOME.y, dist=Math.hypot(dx,dy);
  if(dist>MAX_PULL){x=DART_HOME.x+dx/dist*MAX_PULL;y=DART_HOME.y+dy/dist*MAX_PULL;}
  pxC=x; pyC=y;
  drawDart(pxC,pyC,Math.atan2(DART_HOME.y-y,DART_HOME.x-x)*180/Math.PI-90,false);
  drawCurtain(curtainProg);
}
function onUp(e){
  if(state!=='pull') return;
  const fdx=DART_HOME.x-pxC, fdy=DART_HOME.y-pyC, power=Math.hypot(fdx,fdy);
  if(power<25){cancelPull();return;}
  pulling=false; state='fly';
  const nx=fdx/power, ny=fdy/power;
  const flyD=power*2.2+Math.random()*60-30;
  const tx=Math.max(15,Math.min(W-15,pxC+nx*flyD));
  const ty=Math.max(15,Math.min(H-80,pyC+ny*flyD));
  animFly(pxC,pyC,tx,ty,Math.atan2(-ny,-nx)*180/Math.PI-90);
}
function onLeave(){if(state==='pull') cancelPull();}
function cancelPull(){
  state='idle'; pulling=false;
  drawDart(DART_HOME.x,DART_HOME.y,-90,false); drawCurtain(curtainProg);
  document.getElementById('guideTxt').style.opacity='1';
}

/* ── FLIGHT ── */
function animFly(sx,sy,tx,ty,ang){
  const dur=520, start=performance.now();
  const dxT=tx-sx, dyT=ty-sy;
  function frame(now){
    const t=Math.min((now-start)/dur,1);
    const e=1-Math.pow(1-t,3);
    drawDart(sx+dxT*e, sy+dyT*e-Math.sin(t*Math.PI)*35, ang, false);
    drawCurtain(curtainProg);
    if(t<1){raf=requestAnimationFrame(frame);}
    else{
      drawDart(tx,ty,ang,true);
      const hit=findHit(tx,ty);
      hitDist=hit.district; hitDong=hit.dong; hitLatLng=svgToLatLng(tx,ty);
      highlightDistrict(hitDist); startReveal();
    }
  }
  raf=requestAnimationFrame(frame);
}

/* ── HIT DETECTION ── */
function findHit(x,y){
  const cx=W/2,cy=H/2,a=-mapRot*Math.PI/180;
  const rx=Math.cos(a)*(x-cx)-Math.sin(a)*(y-cy)+cx;
  const ry=Math.sin(a)*(x-cx)+Math.cos(a)*(y-cy)+cy;
  let district=D.find(d=>pip(rx,ry,parsePts(d.p)));
  if(!district) district=D.reduce((b,d)=>Math.hypot(rx-d.cx,ry-d.cy)<Math.hypot(rx-b.cx,ry-b.cy)?d:b,D[0]);
  const dongs=DONGS[district.n]||[];
  const dong=dongs.length?dongs.reduce((b,d)=>Math.hypot(rx-d.x,ry-d.y)<Math.hypot(rx-b.x,ry-b.y)?d:b,dongs[0]):null;
  return {district,dong};
}
function parsePts(s){return s.trim().split(/\s+/).map(p=>{const[x,y]=p.split(',');return{x:+x,y:+y};});}
function pip(px,py,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i].x,yi=poly[i].y,xj=poly[j].x,yj=poly[j].y;
    if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
function highlightDistrict(d){
  const idx=D.indexOf(d);
  const poly=document.querySelector(`[data-i="${idx}"]`);
  if(poly){poly.setAttribute('fill','#f5a62370');poly.setAttribute('stroke','#f5a623');poly.setAttribute('stroke-width','2');}
  const lbl=document.getElementById('lbl'+idx);
  if(lbl){lbl.setAttribute('fill','#f5a623');lbl.setAttribute('font-size','12');lbl.classList.add('dist-label-hit');}
}

/* ── REVEAL ── */
function startReveal(){
  state='reveal';
  const dur=2000, start=performance.now();
  function revealFrame(now){
    const t=Math.min((now-start)/dur,1);
    const ease=t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
    curtainProg=ease; drawCurtain(ease);
    if(t<1){raf=requestAnimationFrame(revealFrame);}
    else{curtainProg=1;drawCurtain(1);state='done';setTimeout(showResult,300);}
  }
  raf=requestAnimationFrame(revealFrame);
}

/* ── RESULT ── */
function showResult(){
  const loc=hitDong?`${hitDist.n} ${hitDong.n}`:hitDist.n;
  document.getElementById('resGu').textContent=hitDist.n;
  document.getElementById('resDong').textContent=hitDong?hitDong.n:'';
  // 카카오맵 링크
  const mapUrl=`https://map.kakao.com/link/map/${encodeURIComponent(loc)},${hitLatLng.lat},${hitLatLng.lng}`;
  document.getElementById('mapLink').href=mapUrl;
  document.getElementById('aiLoading').style.display='block';
  document.getElementById('aiLoading').innerHTML='<div class="ai-spinner"></div><div class="loading-txt">주변 장소를 불러오는 중...</div>';
  document.getElementById('resGrid').style.display='none';
  document.getElementById('gameScreen').classList.add('out');
  document.getElementById('resultScreen').classList.remove('out');
  fetchRecs();
}

/* ── KAKAO LOCAL API ── */
async function fetchRecs(radius=1500){
  const {lat,lng}=hitLatLng;
  const headers={'Authorization':`KakaoAK ${kakaoKey}`};
  const base='https://dapi.kakao.com/v2/local/search/category.json';
  try{
    const[at,ct,fd,ce]=await Promise.all([
      fetch(`${base}?category_group_code=AT4&x=${lng}&y=${lat}&radius=${radius}&sort=distance&size=5`,{headers}).then(r=>r.json()),
      fetch(`${base}?category_group_code=CT1&x=${lng}&y=${lat}&radius=${radius}&sort=distance&size=5`,{headers}).then(r=>r.json()),
      fetch(`${base}?category_group_code=FD6&x=${lng}&y=${lat}&radius=${radius}&sort=distance&size=5`,{headers}).then(r=>r.json()),
      fetch(`${base}?category_group_code=CE7&x=${lng}&y=${lat}&radius=${radius}&sort=distance&size=5`,{headers}).then(r=>r.json()),
    ]);
    const attractions=[...(at.documents||[]),...(ct.documents||[])].sort((a,b)=>+a.distance-+b.distance).slice(0,4);
    const restaurants=(fd.documents||[]).slice(0,4);
    const cafes=(ce.documents||[]).slice(0,4);
    // 결과가 전부 비었으면 반경 넓혀서 재시도
    if(radius<3000 && !attractions.length && !restaurants.length && !cafes.length){
      return fetchRecs(3000);
    }
    renderRecs({attractions, restaurants, cafes});
  }catch(err){
    document.getElementById('aiLoading').innerHTML=
      `<div style="color:var(--red);font-size:13px;padding:20px 0">⚠ 장소 검색 실패: ${err.message}<br><br>
       <button class="btn-retry" style="font-size:13px;padding:10px 22px" onclick="fetchRecs()">다시 시도</button></div>`;
  }
}
function shortCat(cat){if(!cat)return'';const p=cat.split(' > ');return p[p.length-1]||p[0];}
function fmtDist(d){const n=+d;return n>=1000?(n/1000).toFixed(1)+'km':n+'m';}

function renderRecs({attractions,restaurants,cafes}){
  document.getElementById('aiLoading').style.display='none';
  const fill=(id,items)=>{
    document.getElementById(id).innerHTML=items.length
      ?items.map(p=>`<li class="place-item"><a href="${p.place_url}" target="_blank" rel="noopener">
          <div class="place-name">${p.place_name}<span class="place-dist">${fmtDist(p.distance)}</span></div>
          <div class="place-cat">${shortCat(p.category_name)}</div>
          <div class="place-addr">${p.road_address_name||p.address_name}</div>
        </a></li>`).join('')
      :'<li class="place-empty">반경 800m 내 결과 없음</li>';
  };
  fill('list1',attractions); fill('list2',restaurants); fill('list3',cafes);
  document.getElementById('resGrid').style.display='grid';
}

/* ── RESET ── */
function resetGame(){
  if(raf) cancelAnimationFrame(raf);
  state='idle';pulling=false;curtainProg=0;hitDist=hitDong=hitLatLng=null;
  mapRot=[0,90,180,270][Math.floor(Math.random()*4)];
  buildMap(); drawCurtain(0); drawDart(DART_HOME.x,DART_HOME.y,-90,false);
  document.getElementById('resultScreen').classList.add('out');
  document.getElementById('gameScreen').classList.remove('out');
  document.getElementById('guideTxt').style.opacity='1';
}

/* ── MODAL (비상용) ── */
function openModal(){document.getElementById('apiInput').value=kakaoKey;document.getElementById('modalBg').classList.remove('hidden');}
function closeModal(){document.getElementById('modalBg').classList.add('hidden');}
function saveKey(){
  kakaoKey=document.getElementById('apiInput').value.trim();
  localStorage.setItem('sdt_kakao_key',kakaoKey);
  closeModal();
  if(state==='done'&&hitLatLng&&kakaoKey){
    document.getElementById('aiLoading').style.display='block';
    document.getElementById('aiLoading').innerHTML='<div class="ai-spinner"></div><div class="loading-txt">주변 장소를 불러오는 중...</div>';
    document.getElementById('resGrid').style.display='none';
    fetchRecs();
  }
}

/* ── IDLE LOOP ── */
function idleLoop(){
  if(state==='idle'||state==='pull') drawCurtain(curtainProg);
  requestAnimationFrame(idleLoop);
}
idleLoop();
